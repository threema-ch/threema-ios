			shellPath = /bin/sh;
			shellScript = "#!/bin/bash\n\n# Configure Scene Delegate in Info.plist\n#\n# When SCENE_DELEGATE_ROOT_COORDINATOR_DEVELOPMENT flag is present in\n# SWIFT_ACTIVE_COMPILATION_CONDITIONS, this script adds the UIApplicationSceneManifest\n# configuration to the target's Info.plist. Otherwise, it removes it.\n#\n# Add this as a Run Script build phase BEFORE \"Copy Bundle Resources\".\n\nset -euo pipefail\n\nPLIST=\"${TARGET_BUILD_DIR}/${INFOPLIST_PATH}\"\n\n# Fallback to source plist if built plist doesn't exist yet\nif [ ! -f \"$PLIST\" ]; then\n    PLIST=\"${SRCROOT}/${INFOPLIST_FILE}\"\nfi\n\nif [ ! -f \"$PLIST\" ]; then\n    echo \"warning: Info.plist not found at ${PLIST}\"\n    exit 0\nfi\n\nSCENE_MANIFEST_KEY=\"UIApplicationSceneManifest\"\nFLAG=\"SCENE_DELEGATE_ROOT_COORDINATOR_DEVELOPMENT\"\n\nif echo \"${SWIFT_ACTIVE_COMPILATION_CONDITIONS:-}\" | grep -qw \"$FLAG\"; then\n    echo \"note: ${FLAG} is active — adding scene manifest to Info.plist\"\n\n    # Add UIApplicationSceneManifest dictionary\n    /usr/libexec/PlistBuddy -c \"Delete :${SCENE_MANIFEST_KEY}\" \"$PLIST\" 2>/dev/null || true\n    /usr/libexec/PlistBuddy -c \"Add :${SCENE_MANIFEST_KEY} dict\" \"$PLIST\"\n\n    # UIApplicationSupportsMultipleScenes = false\n    /usr/libexec/PlistBuddy -c \"Add :${SCENE_MANIFEST_KEY}:UIApplicationSupportsMultipleScenes bool false\" \"$PLIST\"\n\n    # UISceneConfigurations dictionary\n    /usr/libexec/PlistBuddy -c \"Add :${SCENE_MANIFEST_KEY}:UISceneConfigurations dict\" \"$PLIST\"\n\n    # UIWindowSceneSessionRoleApplication array\n    /usr/libexec/PlistBuddy -c \"Add :${SCENE_MANIFEST_KEY}:UISceneConfigurations:UIWindowSceneSessionRoleApplication array\" \"$PLIST\"\n\n    # First (and only) scene configuration\n    /usr/libexec/PlistBuddy -c \"Add :${SCENE_MANIFEST_KEY}:UISceneConfigurations:UIWindowSceneSessionRoleApplication:0 dict\" \"$PLIST\"\n    /usr/libexec/PlistBuddy -c \"Add :${SCENE_MANIFEST_KEY}:UISceneConfigurations:UIWindowSceneSessionRoleApplication:0:UISceneConfigurationName string 'Default Configuration'\" \"$PLIST\"\n    /usr/libexec/PlistBuddy -c \"Add :${SCENE_MANIFEST_KEY}:UISceneConfigurations:UIWindowSceneSessionRoleApplication:0:UISceneDelegateClassName string '${PRODUCT_MODULE_NAME}.SceneDelegate'\" \"$PLIST\"\n\n    echo \"note: Scene manifest added successfully\"\nelse\n    echo \"note: ${FLAG} is not active — removing scene manifest from Info.plist\"\n\n    /usr/libexec/PlistBuddy -c \"Delete :${SCENE_MANIFEST_KEY}\" \"$PLIST\" 2>/dev/null || true\n\n    echo \"note: Scene manifest removed (or was not present)\"\nfi\n";
		};
